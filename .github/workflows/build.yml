name: Build Flutter SDK for proot (ARM64)

on:
  workflow_dispatch:
    inputs:
      flutter_version:
        description: >
          Flutter version or channel: "stable", "beta", "main", or a tag like "3.29.2".
          Leave empty to use config.toml default.
        required: false
        default: ""
      arch:
        description: "Target architecture"
        required: false
        default: "arm64"
        type: choice
        options:
          - arm64
          - arm
      runtimes:
        description: "Build runtimes (comma-separated)"
        required: false
        default: "debug,release,profile"
      lto:
        description: "Enable Link-Time Optimization (smaller binary, longer build)"
        required: false
        default: false
        type: boolean

env:
  FLUTTER_STORAGE_BASE_URL: "https://storage.googleapis.com"
  PUB_HOSTED_URL: "https://pub.dartlang.org"

jobs:
  # ── Resolve version once so all matrix jobs share the same value ────────────
  resolve:
    name: Resolve Flutter version
    runs-on: ubuntu-latest
    outputs:
      flutter_version: ${{ steps.version.outputs.FLUTTER_VERSION }}
      runtimes_matrix: ${{ steps.matrix.outputs.RUNTIMES_MATRIX }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python requirements
        run: pip install -r requirements.txt

      - name: Resolve Flutter version
        id: version
        run: |
          INPUT="${{ github.event.inputs.flutter_version }}"
          VERSION=$(python3 build.py resolve_version --version="$INPUT")
          echo "FLUTTER_VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Resolved Flutter version: $VERSION"

      # Turn "debug,release,profile" into a JSON array for the matrix
      - name: Build runtimes matrix
        id: matrix
        run: |
          RUNTIMES="${{ github.event.inputs.runtimes || 'debug,release,profile' }}"
          JSON=$(python3 -c "
          import json, sys
          runtimes = [r.strip() for r in '$RUNTIMES'.split(',') if r.strip()]
          print(json.dumps(runtimes))
          ")
          echo "RUNTIMES_MATRIX=$JSON" >> $GITHUB_OUTPUT
          echo "Matrix: $JSON"

  # ── One job per runtime to avoid disk exhaustion ────────────────────────────
  build:
    name: Build (${{ matrix.runtime }})
    needs: resolve
    runs-on: ubuntu-latest
    timeout-minutes: 360

    strategy:
      fail-fast: false
      matrix:
        runtime: ${{ fromJson(needs.resolve.outputs.runtimes_matrix) }}

    steps:
      # ── 0. Aggressive pre-cleanup (must run BEFORE maximize-build-space) ────
      #    These directories are not needed for a Flutter engine build and each
      #    takes several GB.  Doing this before the action ensures the freed
      #    space is included in the merged volume.
      - name: Free disk space (pre-maximize)
        run: |
          echo "=== Disk before cleanup ==="
          df -h
          sudo rm -rf \
            /usr/local/lib/android \
            /usr/local/share/powershell \
            /usr/local/share/chromium \
            /usr/share/dotnet \
            /usr/share/swift \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /opt/hostedtoolcache/go \
            /opt/hostedtoolcache/PyPy \
            /opt/hostedtoolcache/node \
            /opt/hostedtoolcache/Ruby \
            /opt/hostedtoolcache/Java_Temurin-Hotspot_jdk \
            "$AGENT_TOOLSDIRECTORY" || true
          sudo apt-get clean
          sudo docker image prune --all --force || true
          echo "=== Disk after cleanup ==="
          df -h

      # ── 1. Maximize disk space ───────────────────────────────────────────────
      - name: Maximize build space
        uses: easimon/maximize-build-space@v10
        with:
          root-reserve-mb: 8192      # keep 8 GB for the runner itself
          swap-size-mb: 4096
          remove-dotnet: "true"
          remove-haskell: "true"
          remove-android: "true"
          remove-codeql: "true"
          remove-docker-images: "true"

      - name: Show disk after maximize
        run: df -h

      # ── 2. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 3. System dependencies ───────────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git curl wget ca-certificates \
            ninja-build \
            libfreetype-dev \
            python3 python3-pip \
            dpkg \
            patchelf \
            pkg-config \
            binutils-aarch64-linux-gnu \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu

      # ── 4. Python dependencies ───────────────────────────────────────────────
      - name: Install Python requirements
        run: pip install -r requirements.txt

      # ── 5. depot_tools ───────────────────────────────────────────────────────
      #    The newkdev action clones into /home/runner/depot_tools which sits on
      #    the original small root disk (~14 GB, already mostly consumed by the
      #    runner itself).  We clone manually into $GITHUB_WORKSPACE instead —
      #    that directory lives on the large LVM volume created by
      #    maximize-build-space.  A symlink keeps any tool that hard-codes the
      #    old path happy.
      - name: Setup depot_tools (manual, onto expanded disk)
        run: |
          git clone --depth=1 \
            https://chromium.googlesource.com/chromium/tools/depot_tools.git \
            "$GITHUB_WORKSPACE/depot_tools"
          # Bootstrap depot_tools so python3_bin_reldir.txt and friends are created
          "$GITHUB_WORKSPACE/depot_tools/update_depot_tools"
          # Symlink so anything that hard-codes /home/runner/depot_tools still works
          ln -sfn "$GITHUB_WORKSPACE/depot_tools" /home/runner/depot_tools || true
          echo "$GITHUB_WORKSPACE/depot_tools" >> "$GITHUB_PATH"
          echo "$GITHUB_WORKSPACE/depot_tools/python-bin" >> "$GITHUB_PATH"

      # ── 6. Cache engine deps ─────────────────────────────────────────────────
      #    Key includes the runtime so each job restores its own slice of cache.
      #    Shared engine source is stored under a common prefix so cache can be
      #    reused across runtimes when only the compiled output differs.
      - name: Cache engine deps (gclient)
        id: cache-engine
        uses: actions/cache@v4
        with:
          path: |
            flutter/engine
            flutter/.pub-preload-cache
          key: engine-${{ needs.resolve.outputs.flutter_version }}-${{ runner.os }}-${{ matrix.runtime }}
          restore-keys: |
            engine-${{ needs.resolve.outputs.flutter_version }}-${{ runner.os }}-
            engine-${{ needs.resolve.outputs.flutter_version }}-

      # ── 7. Clone Flutter SDK ─────────────────────────────────────────────────
      - name: Clone Flutter
        run: |
          python3 build.py clone \
            --version="${{ needs.resolve.outputs.flutter_version }}"

      # ── 8. gclient sync ──────────────────────────────────────────────────────
      - name: Sync engine dependencies (gclient)
        if: steps.cache-engine.outputs.cache-hit != 'true'
        run: python3 build.py sync

      # ── 9. ARM64 sysroot ─────────────────────────────────────────────────────
      - name: Install ARM64 sysroot
        run: |
          python3 build.py install_sysroot \
            --arch="${{ github.event.inputs.arch || 'arm64' }}"

      # ── 10. Disk check ───────────────────────────────────────────────────────
      - name: Check disk space before build
        run: df -h

      # ── 11. Configure (GN) ───────────────────────────────────────────────────
      - name: Configure build (GN)
        run: |
          python3 build.py configure \
            --arch="${{ github.event.inputs.arch || 'arm64' }}" \
            --runtimes="${{ matrix.runtime }}" \
            --lto="${{ github.event.inputs.lto || 'false' }}"

      # ── 12. Build (ninja) ────────────────────────────────────────────────────
      - name: Build engine + Dart SDK (ninja) — ${{ matrix.runtime }}
        run: |
          python3 build.py build \
            --arch="${{ github.event.inputs.arch || 'arm64' }}" \
            --runtimes="${{ matrix.runtime }}"

      # ── 13. Prune object files to reclaim disk before assemble/package ───────
      #    The .o/.a files are only needed during linking.  Once ninja finishes
      #    they are dead weight — often 10-30 GB for a single runtime.
      - name: Prune build object files
        run: |
          echo "=== Disk before prune ==="
          df -h
          # Remove intermediate object files from the ninja output dirs.
          # Adjust the glob if build.py places them elsewhere.
          find flutter/engine/src/out -type f \( -name "*.o" -o -name "*.a" \) -delete 2>/dev/null || true
          echo "=== Disk after prune ==="
          df -h

      # ── 14. Assemble SDK ─────────────────────────────────────────────────────
      - name: Assemble Flutter SDK and create stamps
        run: |
          python3 build.py assemble \
            --arch="${{ github.event.inputs.arch || 'arm64' }}" \
            --runtimes="${{ matrix.runtime }}"

      # ── 15. Package ──────────────────────────────────────────────────────────
      - name: Package Flutter SDK (${{ matrix.runtime }})
        id: package
        run: |
          ARCH="${{ github.event.inputs.arch || 'arm64' }}"
          VERSION="${{ needs.resolve.outputs.flutter_version }}"
          python3 build.py package \
            --arch="$ARCH" \
            --version="$VERSION" \
            --runtimes="${{ matrix.runtime }}"
          PKG_NAME="flutter-${VERSION}-linux-${ARCH}-${{ matrix.runtime }}.tar.gz"
          echo "PACKAGE_NAME=$PKG_NAME" >> $GITHUB_OUTPUT

      - name: Check disk space after build
        run: df -h

      # ── 16. Upload per-runtime artifact ──────────────────────────────────────
      - name: Upload SDK artifact (${{ matrix.runtime }})
        uses: actions/upload-artifact@v4
        with:
          name: flutter-sdk-${{ needs.resolve.outputs.flutter_version }}-${{ github.event.inputs.arch || 'arm64' }}-${{ matrix.runtime }}
          path: "*.tar.gz"
          compression-level: 0
          retention-days: 7

  # ── Merge all runtime artifacts into one GitHub Release ─────────────────────
  release:
    name: Create GitHub Release
    needs: [resolve, build]
    runs-on: ubuntu-latest
    if: always() && needs.build.result != 'cancelled'

    steps:
      - name: Download all runtime artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: flutter-sdk-${{ needs.resolve.outputs.flutter_version }}-${{ github.event.inputs.arch || 'arm64' }}-*
          merge-multiple: true

      - name: List downloaded files
        run: ls -lh *.tar.gz

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "flutter-${{ needs.resolve.outputs.flutter_version }}-${{ github.event.inputs.arch || 'arm64' }}"
          name: "Flutter ${{ needs.resolve.outputs.flutter_version }} (Linux ${{ github.event.inputs.arch || 'arm64' }} / proot)"
          body: |
            ## Flutter SDK for proot ARM64

            **Flutter version:** `${{ needs.resolve.outputs.flutter_version }}`
            **Target arch:** `${{ github.event.inputs.arch || 'arm64' }}`
            **Runtimes:** `${{ github.event.inputs.runtimes || 'debug,release,profile' }}`

            ### Installation (inside proot)

            ```bash
            # 1. Extract the SDK (choose the runtime you need)
            tar -xzf flutter-<version>-linux-arm64-release.tar.gz -C /opt

            # 2. Run the install script
            bash /opt/flutter/flutter-proot-install.sh

            # 3. Add to PATH
            export PATH="$PATH:/opt/flutter/bin"

            # 4. Verify
            flutter doctor
            ```

            > ⚠️ All artifacts are pre-built and stamped — `flutter` will NOT try to re-download anything.
          files: "*.tar.gz"
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}