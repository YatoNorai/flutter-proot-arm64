name: Build Flutter SDK for proot (ARM64)

on:
  workflow_dispatch:
    inputs:
      flutter_version:
        description: >
          Flutter version or channel: "stable", "beta", "main", or a tag like "3.29.2".
          Leave empty to use config.toml default.
        required: false
        default: ""
      arch:
        description: "Target architecture"
        required: false
        default: "arm64"
        type: choice
        options:
          - arm64
          - arm
      runtimes:
        description: "Build runtimes (comma-separated). Tip: use only 'release' to save ~40 GB of disk."
        required: false
        default: "release"
      lto:
        description: "Enable Link-Time Optimization (smaller binary, longer build)"
        required: false
        default: false
        type: boolean

env:
  FLUTTER_STORAGE_BASE_URL: "https://storage.googleapis.com"
  PUB_HOSTED_URL: "https://pub.dartlang.org"

jobs:
  build:
    name: Build Flutter ARM64 for proot
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      # ── 1. Maximize disk space ──────────────────────────────────────────────
      # Mounts extra space at /mnt and symlinks the engine out/ dir there so
      # ninja intermediate objects never land on the root partition.
      - name: Maximize build space
        uses: easimon/maximize-build-space@v10
        with:
          root-reserve-mb: 8192        # keep 8 GB for OS + apt + tools
          swap-size-mb: 4096           # extra swap prevents OOM during link
          remove-dotnet: "true"
          remove-haskell: "true"
          remove-android: "true"
          remove-codeql: "true"
          remove-docker-images: "true"
          build-mount-path: "/mnt/build"

      # ── 2. Extra cleanup (things maximize-build-space misses) ───────────────
      - name: Extra disk cleanup
        run: |
          # Stop and purge Docker daemon (images already removed above, but
          # the daemon itself + overlay dirs can hold a few extra GB)
          sudo systemctl stop docker || true
          sudo rm -rf /var/lib/docker /var/lib/containerd

          # Purge large pre-installed tool suites we don't need
          sudo apt-get purge -y \
            '^llvm-.*' '^libllvm.*' '^php.*' '^mongodb.*' '^mysql.*' \
            '^postgresql.*' azure-cli google-cloud-sdk google-chrome-stable \
            firefox powershell snapd || true
          sudo apt-get autoremove -y
          sudo apt-get clean
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /usr/local/share/boost \
            /var/cache/apt/archives \
            /tmp/*

          echo "=== Disk after extra cleanup ==="
          df -h

      # ── 3. Checkout this repo ───────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 4. System dependencies ──────────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git curl wget ca-certificates \
            ninja-build \
            libfreetype-dev \
            python3 python3-pip \
            dpkg \
            patchelf \
            pkg-config \
            binutils-aarch64-linux-gnu \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu

      # ── 5. Python dependencies ──────────────────────────────────────────────
      - name: Install Python requirements
        run: pip install -r requirements.txt

      # ── 6. Setup depot_tools ────────────────────────────────────────────────
      - name: Setup depot_tools
        uses: newkdev/setup-depot-tools@v1.0.1

      # ── 7. Resolve Flutter version ──────────────────────────────────────────
      - name: Resolve Flutter version
        id: version
        run: |
          INPUT="${{ github.event.inputs.flutter_version }}"
          VERSION=$(python3 build.py resolve_version --version="$INPUT")
          echo "FLUTTER_VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Resolved Flutter version: $VERSION"

      # ── 8. Cache gclient dependencies ───────────────────────────────────────
      # NOTE: The cache key includes the Flutter version so a version bump
      # automatically invalidates stale engine deps.
      - name: Cache engine deps (gclient)
        id: cache-engine
        uses: actions/cache@v4
        with:
          path: |
            flutter/engine
            flutter/.pub-preload-cache
          key: engine-${{ steps.version.outputs.FLUTTER_VERSION }}-${{ runner.os }}
          restore-keys: |
            engine-${{ steps.version.outputs.FLUTTER_VERSION }}-

      # ── 9. Clone Flutter SDK ─────────────────────────────────────────────────
      - name: Clone Flutter
        run: |
          python3 build.py clone \
            --version="${{ steps.version.outputs.FLUTTER_VERSION }}"

      # ── 10. gclient sync (fetch engine, Dart, deps) ──────────────────────────
      - name: Sync engine dependencies (gclient)
        if: steps.cache-engine.outputs.cache-hit != 'true'
        run: |
          python3 build.py sync

          # gclient leaves behind large .git history in third-party deps that
          # we won't need to diff/log — strip it to reclaim ~2-4 GB.
          echo "Stripping .git dirs from third-party deps..."
          find flutter/engine/src/third_party -maxdepth 3 -name ".git" \
            -exec rm -rf {} + 2>/dev/null || true
          find flutter/engine/src/flutter/third_party -maxdepth 3 -name ".git" \
            -exec rm -rf {} + 2>/dev/null || true

          echo "=== Disk after gclient sync ==="
          df -h

      # ── 11. Install ARM64 sysroot ─────────────────────────────────────────────
      - name: Install ARM64 sysroot
        run: |
          python3 build.py install_sysroot \
            --arch="${{ github.event.inputs.arch || 'arm64' }}"

      # ── 12. Symlink engine out/ to /mnt/build ─────────────────────────────────
      # Ninja writes all object files and intermediates into engine/src/out/.
      # By symlinking it onto the large /mnt/build partition we keep the root
      # filesystem from filling up.
      - name: Symlink engine out/ → /mnt/build/out
        run: |
          mkdir -p /mnt/build/out
          mkdir -p flutter/engine/src
          # Remove any existing out dir (e.g. from a restored cache)
          rm -rf flutter/engine/src/out
          ln -s /mnt/build/out flutter/engine/src/out
          echo "Symlink created: flutter/engine/src/out → /mnt/build/out"
          df -h

      # ── 13. Check disk space before build ─────────────────────────────────────
      - name: Check disk space before build
        run: df -h

      # ── 14. Build each runtime individually (GN → ninja → assemble → clean) ───
      # Building all runtimes at once leaves every out/linux_{mode}_{arch}
      # directory on disk simultaneously, which can exceed 60 GB.
      # Instead we build one runtime at a time and delete its out/ tree as
      # soon as the artifacts have been assembled into the Flutter SDK cache.
      - name: Build engine + Dart SDK (per-runtime)
        run: |
          ARCH="${{ github.event.inputs.arch || 'arm64' }}"
          RUNTIMES="${{ github.event.inputs.runtimes || 'release' }}"
          LTO="${{ github.event.inputs.lto || 'false' }}"

          IFS=',' read -ra MODES <<< "$RUNTIMES"
          for MODE in "${MODES[@]}"; do
            MODE="$(echo "$MODE" | xargs)"   # trim whitespace
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  Configuring  : $MODE ($ARCH)"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            python3 build.py configure \
              --arch="$ARCH" \
              --runtimes="$MODE" \
              --lto="$LTO"

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  Building     : $MODE ($ARCH)"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            python3 build.py build \
              --arch="$ARCH" \
              --runtimes="$MODE"

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  Assembling   : $MODE ($ARCH)"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            python3 build.py assemble \
              --arch="$ARCH" \
              --runtimes="$MODE"

            # ── KEY FIX: delete the out/ subdirectory for this runtime ──────
            # This frees 15-25 GB of object files before the next runtime
            # starts, preventing "No space left on device" errors.
            OUT_DIR="flutter/engine/src/out/linux_${MODE}_${ARCH}"
            echo "Cleaning up build intermediates: $OUT_DIR"
            rm -rf "$OUT_DIR"

            echo "=== Disk after $MODE cleanup ==="
            df -h
          done

      # ── 15. Package ───────────────────────────────────────────────────────────
      - name: Package Flutter SDK
        id: package
        run: |
          ARCH="${{ github.event.inputs.arch || 'arm64' }}"
          VERSION="${{ steps.version.outputs.FLUTTER_VERSION }}"
          python3 build.py package \
            --arch="$ARCH" \
            --version="$VERSION"

          PKG_NAME="flutter-${VERSION}-linux-${ARCH}-proot.tar.gz"
          echo "PACKAGE_NAME=$PKG_NAME" >> $GITHUB_OUTPUT

      # ── 16. Check disk usage after build ──────────────────────────────────────
      - name: Check disk space after build
        run: df -h

      # ── 17. Upload artifact (for inspection) ──────────────────────────────────
      - name: Upload SDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-sdk-${{ steps.version.outputs.FLUTTER_VERSION }}-${{ github.event.inputs.arch || 'arm64' }}
          path: "*.tar.gz"
          compression-level: 0
          retention-days: 7

      # ── 18. Create GitHub release ─────────────────────────────────────────────
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "flutter-${{ steps.version.outputs.FLUTTER_VERSION }}-${{ github.event.inputs.arch || 'arm64' }}"
          name: "Flutter ${{ steps.version.outputs.FLUTTER_VERSION }} (Linux ${{ github.event.inputs.arch || 'arm64' }} / proot)"
          body: |
            ## Flutter SDK for proot ARM64

            **Flutter version:** `${{ steps.version.outputs.FLUTTER_VERSION }}`  
            **Target arch:** `${{ github.event.inputs.arch || 'arm64' }}`  
            **Runtimes:** `${{ github.event.inputs.runtimes || 'release' }}`

            ### Installation (inside proot)

            ```bash
            # 1. Extract the SDK
            tar -xzf ${{ steps.package.outputs.PACKAGE_NAME }} -C /opt

            # 2. Run the install script
            bash /opt/flutter/flutter-proot-install.sh

            # 3. Add to PATH (add to ~/.bashrc or ~/.zshrc)
            export PATH="$PATH:/opt/flutter/bin"

            # 4. Verify
            flutter doctor
            ```

            > ⚠️ All artifacts are pre-built and stamped — `flutter` will NOT try to re-download anything.
          files: "*.tar.gz"
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}