name: Build Flutter SDK for proot (ARM64)

on:
  workflow_dispatch:
    inputs:
      flutter_version:
        description: >
          Flutter version or channel: "stable", "beta", "main", or a tag like "3.29.2".
          Leave empty to use config.toml default.
        required: false
        default: ""
      arch:
        description: "Target architecture"
        required: false
        default: "arm64"
        type: choice
        options:
          - arm64
          - arm
      runtimes:
        description: "Build runtimes (comma-separated). Use only 'release' to save ~40 GB of disk."
        required: false
        default: "release"
      lto:
        description: "Enable Link-Time Optimization (smaller binary, longer build)"
        required: false
        default: false
        type: boolean

env:
  FLUTTER_STORAGE_BASE_URL: "https://storage.googleapis.com"
  PUB_HOSTED_URL: "https://pub.dartlang.org"

jobs:
  build:
    name: Build Flutter ARM64 for proot
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      # ── 1. Maximize disk space ──────────────────────────────────────────────
      # Mounts a large partition at /mnt/build.
      # We will redirect ALL large files (flutter clone + engine + out/) there
      # via symlinks so the root partition (/home/runner) never fills up.
      - name: Maximize build space
        uses: easimon/maximize-build-space@v10
        with:
          root-reserve-mb: 10240        # keep 10 GB for OS, apt, tools, runner logs
          swap-size-mb: 4096
          remove-dotnet: "true"
          remove-haskell: "true"
          remove-android: "true"
          remove-codeql: "true"
          remove-docker-images: "true"
          build-mount-path: "/mnt/build"

      # ── 2. Aggressive pre-build cleanup ────────────────────────────────────
      # IMPORTANT: apt-get needs free space to write /var/lib/apt/lists/.
      # We MUST free disk with rm -rf FIRST, before any apt command.
      - name: Extra disk cleanup
        run: |
          # ── Phase 1: raw deletes (no apt needed, frees space immediately) ──
          sudo systemctl stop docker.socket docker.service || true
          sudo rm -rf \
            /var/lib/docker \
            /var/lib/containerd \
            /var/lib/apt/lists/* \
            /var/cache/apt/archives \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /opt/hostedtoolcache \
            /usr/local/share/boost \
            /usr/share/swift \
            /usr/local/julia* \
            /usr/share/kotlinc \
            /usr/local/lib/node_modules \
            /usr/lib/google-cloud-sdk \
            /usr/lib/jvm \
            /usr/share/gradle* \
            /usr/share/miniconda \
            /usr/local/aws-cli \
            /usr/local/aws-sam-cli \
            /tmp/*

          echo "=== Disk after phase-1 rm cleanup ==="
          df -h

          # ── Phase 2: apt purge (now there is space to write lists) ──────────
          sudo apt-get update -qq 2>/dev/null || true
          sudo apt-get purge -y --auto-remove \
            '^llvm-.*' '^libllvm.*' '^php.*' '^mongodb.*' '^mysql.*' \
            '^postgresql.*' '^dotnet-.*' '^aspnetcore-.*' \
            azure-cli google-chrome-stable firefox powershell snapd \
            google-cloud-cli || true
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*

          echo "=== Disk after phase-2 apt cleanup ==="
          df -h

      # ── 3. Checkout this repo ───────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 4. Redirect ALL large directories to /mnt/build (BEFORE clone) ─────
      # The Flutter clone + engine deps + ninja out/ can exceed 60 GB combined.
      # Everything must land on /mnt/build, NOT on the root partition
      # (/home/runner/work). We create the real dirs on /mnt/build first,
      # then symlink the workspace paths to them. This must run BEFORE any
      # step that downloads or writes to these paths.
      - name: Redirect large dirs to /mnt/build
        run: |
          # flutter/ — the Flutter SDK clone + engine/src (gclient downloads here)
          mkdir -p /mnt/build/flutter
          ln -s /mnt/build/flutter "$GITHUB_WORKSPACE/flutter"

          # sysroot/ — ARM64 cross-compilation sysroot
          mkdir -p /mnt/build/sysroot
          ln -s /mnt/build/sysroot "$GITHUB_WORKSPACE/sysroot"

          echo "Symlinks created:"
          ls -la "$GITHUB_WORKSPACE/"
          echo "=== Disk after redirect ==="
          df -h

      # ── 5. Patch build.py ──────────────────────────────────────────────────
      # _current_tag() only catches GitCommandError, but when the flutter/
      # symlink target exists as an empty dir, git.Repo() raises
      # InvalidGitRepositoryError — which is not caught, crashing clone.
      # Patch it so an empty dir is treated as "not yet cloned" (returns None).
      - name: Patch build.py (_current_tag exception handling)
        run: |
          sed -i \
            's/except git\.exc\.GitCommandError:/except (git.exc.GitCommandError, git.exc.InvalidGitRepositoryError):/' \
            build.py
          echo "Patch applied:"
          grep -n "except.*GitCommandError\|except.*InvalidGit" build.py

      # ── 6. System dependencies ──────────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git curl wget ca-certificates \
            ninja-build \
            libfreetype-dev \
            python3 python3-pip \
            dpkg \
            patchelf \
            pkg-config \
            binutils-aarch64-linux-gnu \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu

      # ── 6. Python dependencies ──────────────────────────────────────────────
      - name: Install Python requirements
        run: pip install -r requirements.txt

      # ── 7. Setup depot_tools ────────────────────────────────────────────────
      # The newkdev/setup-depot-tools action uses PowerShell (pwsh) internally,
      # which is not available on ubuntu-latest. Install manually via bash.
      - name: Setup depot_tools
        run: |
          git clone --depth=1 \
            https://chromium.googlesource.com/chromium/tools/depot_tools.git \
            /mnt/build/depot_tools
          echo "/mnt/build/depot_tools" >> $GITHUB_PATH
          echo "DEPOT_TOOLS=/mnt/build/depot_tools" >> $GITHUB_ENV

      # ── 8. Resolve Flutter version ──────────────────────────────────────────
      - name: Resolve Flutter version
        id: version
        run: |
          INPUT="${{ github.event.inputs.flutter_version }}"
          VERSION=$(python3 build.py resolve_version --version="$INPUT")
          echo "FLUTTER_VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Resolved Flutter version: $VERSION"

      # ── 9. Cache gclient dependencies ───────────────────────────────────────
      # Cache is stored in /mnt/build/flutter (via the symlink) so the
      # cache restore also writes to /mnt/build, not the root partition.
      - name: Cache engine deps (gclient)
        id: cache-engine
        uses: actions/cache@v4
        with:
          path: |
            flutter/engine
            flutter/.pub-preload-cache
          key: engine-${{ steps.version.outputs.FLUTTER_VERSION }}-${{ runner.os }}
          restore-keys: |
            engine-${{ steps.version.outputs.FLUTTER_VERSION }}-

      # ── 10. Clone Flutter SDK ─────────────────────────────────────────────────
      - name: Clone Flutter
        run: |
          python3 build.py clone \
            --version="${{ steps.version.outputs.FLUTTER_VERSION }}"

          echo "=== Disk after clone ==="
          df -h

      # ── 11. gclient sync ──────────────────────────────────────────────────────
      - name: Sync engine dependencies (gclient)
        if: steps.cache-engine.outputs.cache-hit != 'true'
        run: |
          python3 build.py sync

          # Strip .git history from third-party deps — not needed for building,
          # saves ~2-4 GB.
          echo "Stripping .git dirs from third-party deps..."
          find flutter/engine/src/third_party -maxdepth 3 -name ".git" \
            -exec rm -rf {} + 2>/dev/null || true
          find flutter/engine/src/flutter/third_party -maxdepth 3 -name ".git" \
            -exec rm -rf {} + 2>/dev/null || true

          echo "=== Disk after gclient sync ==="
          df -h

      # ── 12. Install ARM64 sysroot ─────────────────────────────────────────────
      - name: Install ARM64 sysroot
        run: |
          python3 build.py install_sysroot \
            --arch="${{ github.event.inputs.arch || 'arm64' }}"

          echo "=== Disk after sysroot install ==="
          df -h

      # ── 13. Build each runtime individually: GN → ninja → assemble → rm out/ ─
      # Building all runtimes at once keeps every out/linux_{mode}_arm64 on
      # disk simultaneously (15-25 GB each). Instead, build one at a time and
      # delete the out/ tree immediately after assembling the artifacts.
      - name: Build engine + Dart SDK (per-runtime)
        run: |
          ARCH="${{ github.event.inputs.arch || 'arm64' }}"
          RUNTIMES="${{ github.event.inputs.runtimes || 'release' }}"
          LTO="${{ github.event.inputs.lto || 'false' }}"

          IFS=',' read -ra MODES <<< "$RUNTIMES"
          for MODE in "${MODES[@]}"; do
            MODE="$(echo "$MODE" | xargs)"   # trim whitespace

            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  Configuring  : $MODE ($ARCH)"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            python3 build.py configure \
              --arch="$ARCH" \
              --runtimes="$MODE" \
              --lto="$LTO"

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  Building     : $MODE ($ARCH)"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            df -h
            python3 build.py build \
              --arch="$ARCH" \
              --runtimes="$MODE"

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  Assembling   : $MODE ($ARCH)"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            python3 build.py assemble \
              --arch="$ARCH" \
              --runtimes="$MODE"

            # Delete ninja intermediates immediately after assembly.
            # This frees 15-25 GB before the next runtime starts.
            OUT_DIR="flutter/engine/src/out/linux_${MODE}_${ARCH}"
            echo "Cleaning build intermediates: $OUT_DIR"
            rm -rf "$OUT_DIR"

            echo "=== Disk after $MODE cleanup ==="
            df -h
          done

      # ── 14. Package ───────────────────────────────────────────────────────────
      - name: Package Flutter SDK
        id: package
        run: |
          ARCH="${{ github.event.inputs.arch || 'arm64' }}"
          VERSION="${{ steps.version.outputs.FLUTTER_VERSION }}"
          python3 build.py package \
            --arch="$ARCH" \
            --version="$VERSION"

          PKG_NAME="flutter-${VERSION}-linux-${ARCH}-proot.tar.gz"
          echo "PACKAGE_NAME=$PKG_NAME" >> $GITHUB_OUTPUT

      # ── 15. Check disk usage after build ──────────────────────────────────────
      - name: Check disk space after build
        run: df -h

      # ── 16. Upload artifact ───────────────────────────────────────────────────
      - name: Upload SDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-sdk-${{ steps.version.outputs.FLUTTER_VERSION }}-${{ github.event.inputs.arch || 'arm64' }}
          path: "*.tar.gz"
          compression-level: 0
          retention-days: 7

      # ── 17. Create GitHub release ─────────────────────────────────────────────
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "flutter-${{ steps.version.outputs.FLUTTER_VERSION }}-${{ github.event.inputs.arch || 'arm64' }}"
          name: "Flutter ${{ steps.version.outputs.FLUTTER_VERSION }} (Linux ${{ github.event.inputs.arch || 'arm64' }} / proot)"
          body: |
            ## Flutter SDK for proot ARM64

            **Flutter version:** `${{ steps.version.outputs.FLUTTER_VERSION }}`  
            **Target arch:** `${{ github.event.inputs.arch || 'arm64' }}`  
            **Runtimes:** `${{ github.event.inputs.runtimes || 'release' }}`

            ### Installation (inside proot)

            ```bash
            # 1. Extract the SDK
            tar -xzf ${{ steps.package.outputs.PACKAGE_NAME }} -C /opt

            # 2. Run the install script
            bash /opt/flutter/flutter-proot-install.sh

            # 3. Add to PATH (add to ~/.bashrc ou ~/.zshrc)
            export PATH="$PATH:/opt/flutter/bin"

            # 4. Verify
            flutter doctor
            ```

            > ⚠️ All artifacts are pre-built and stamped — `flutter` will NOT try to re-download anything.
          files: "*.tar.gz"
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}