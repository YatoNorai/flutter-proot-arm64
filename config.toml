# flutter-proot-arm64 — Build Configuration
# ───────────────────────────────────────────────────────────────────────────────
# All settings here can be overridden via workflow_dispatch inputs or CLI flags.
# Nothing in this file is hardcoded into the build scripts themselves.

[flutter]
# Flutter version or channel.
# Values: "stable", "beta", "main", or a specific tag e.g. "3.29.2"
# If empty (""), defaults to "stable" (latest stable release).
channel = "stable"
version = ""                                  # set to override channel

repo    = "https://github.com/flutter/flutter"
path    = "./flutter"                         # relative path for clone output

[build]
# Target architectures. Each arch gets its own sysroot + build.
# Supported: "arm64", "arm"  (x64/x86 for host builds not needed for proot)
arch = ["arm64"]

# Build runtimes. "debug" is required; "release" and "profile" are optional.
# Adding more runtimes increases build time significantly.
runtime = ["debug", "release", "profile"]

# gclient configuration file (relative to repo root)
gclient = "./.gclient"

# Number of parallel build jobs. 0 = auto-detect (uses nproc).
jobs = 0

# Enable Link-Time Optimization. Produces smaller/faster binaries at the cost
# of significantly longer link times. Recommended: false for CI, true for dist.
lto = false

# ── Sysroot configuration ──────────────────────────────────────────────────────
# The sysroot is used for cross-compilation.
# Primary: Flutter engine's own install-sysroot.py (downloads Debian Bullseye)
# Fallback: Download packages listed below directly.
[sysroot]
path = "./sysroot"            # fallback sysroot base directory

# Debian Bookworm ARM64 packages for the fallback sysroot.
# These provide the headers + libraries needed to cross-compile Flutter for
# a standard Linux ARM64 (glibc) proot environment (Ubuntu/Debian).
[sysroot.debian-bookworm]
repo = "http://deb.debian.org/debian/"
dist = "bookworm"
pkgs = [
  # GTK3 and its dependency tree (Flutter Linux uses GTK3 by default)
  "libgtk-3-dev",
  "libglib2.0-dev",
  "libpango1.0-dev",
  "libfontconfig1-dev",
  "libfreetype-dev",
  "libharfbuzz-dev",
  "libepoxy-dev",
  "libcairo2-dev",
  "libatk1.0-dev",
  "libatspi2.0-dev",
  "libgdk-pixbuf-2.0-dev",
  # Wayland + X11 (GTK3 may use either)
  "libwayland-dev",
  "libxkbcommon-dev",
  "libx11-dev",
  "libxext-dev",
  "libxrender-dev",
  "libxcursor-dev",
  "libxi-dev",
  "libxrandr-dev",
  "libxfixes-dev",
  "libxcomposite-dev",
  "libxdamage-dev",
  "libxinerama-dev",
  # OpenGL / EGL
  "libegl1-mesa-dev",
  "libgl1-mesa-dev",
  "libgles2-mesa-dev",
  # System libs
  "libdbus-1-dev",
  "libffi-dev",
  "libpixman-1-dev",
  "libpng-dev",
  "libjpeg62-turbo-dev",
  "zlib1g-dev",
  "libbrotli-dev",
  "libpcre2-dev",
  "liblzma-dev",
  # C runtime
  "libc6-dev",
]

# ── Output package configuration ───────────────────────────────────────────────
[package]
# Output archive format: "tar.gz" or "zip"
format = "tar.gz"

# Output filename template.
# Available variables: {version}, {arch}
name = "flutter-{version}-linux-{arch}-proot"
